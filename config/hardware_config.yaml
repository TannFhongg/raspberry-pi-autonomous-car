# Hardware Configuration for Raspberry Pi 5 + Arduino Uno
# Robot: 2 rear motors + 1 front universal wheel
# Lane Detection: Camera ONLY (No IR sensors)
# UPDATED: Added Picamera2 support (Full FOV 1640x1232)

# Control Mode: 'arduino' or 'direct'
control_mode: 'arduino'

# Arduino Configuration
arduino:
  port: '/dev/ttyACM0'  # Arduino Uno port
  baudrate: 115200
  timeout: 1.0
  reconnect_interval: 5.0
  
  # Arduino Uno pin mapping
  pins:
    # Motor pins
    left_motor_pwm: 9      # ENA - PWM
    left_motor_in1: 2      # IN1 - Direction
    left_motor_in2: 3      # IN2 - Direction
    right_motor_pwm: 10    # ENB - PWM
    right_motor_in3: 4     # IN3 - Direction
    right_motor_in4: 5     # IN4 - Direction
    
    # Sensor pins
    ultrasonic_trig: 12
    ultrasonic_echo: 11
    # NO LINE SENSORS - Camera only

# Motor Driver Configuration (backup - not used when Arduino controls)
motor_driver:
  type: "L298N"
  left_motor:
    enable_pin: 18
    input1_pin: 23
    input2_pin: 24
    max_speed: 255
    min_speed: 0
    reverse: false
  right_motor:
    enable_pin: 13
    input1_pin: 27
    input2_pin: 22
    max_speed: 255
    min_speed: 0
    reverse: false

# PWM Configuration
pwm:
  frequency: 1000  # Hz

# Robot Physical Parameters
robot:
  wheel_diameter: 0.065    # meters (65mm)
  wheel_base: 0.15         # meters (150mm)
  max_speed: 0.5           # m/s
  max_angular_speed: 1.0   # rad/s

# Safety Limits
safety:
  emergency_stop_distance: 0.2  # meters (20cm)
  max_acceleration: 2.0         # m/s²
  timeout: 5.0                  # seconds
  min_safe_distance: 15.0       # cm

# Sensor Configuration
sensors:
  # HC-SR04 Ultrasonic (Obstacle Detection)
  ultrasonic:
    enabled: true
    max_distance: 400.0   # cm
    min_distance: 2.0     # cm
    update_rate: 10       # Hz
  
  # NO IR LINE SENSORS (Camera only)
  line_sensors:
    enabled: false
    count: 0
    pins: []
  
  # Raspberry Pi Camera (PRIMARY - Lane Detection)
  camera:
    enabled: true
    backend: 'picamera2'
    resolution: [1640, 1232]   # <--- ĐÃ SỬA: GÓC RỘNG (Full FOV)
    framerate: 30
    device: 0
    
    # Picamera2 specific settings
    picamera2:
      format: 'RGB888'
      buffer_count: 4
      
      # Camera controls (Tối ưu cho vạch đen nền trắng)
      controls:
        FrameRate: 30
        ExposureTime: null
        AnalogueGain: 1.0
        Brightness: 0.0
        Contrast: 1.2          # Tăng tương phản
        Saturation: 0.8        # Giảm bão hòa màu
        Sharpness: 1.2         # Tăng độ nét cạnh

# AI/Computer Vision Settings
ai:
  # Lane Detection (Camera-based) - OPTIMIZED FOR BLACK LINES
  lane_detection:
    enabled: true
    method: 'opencv'
    
    # Physical parameters
    lane_width_cm: 38
    robot_width_cm: 15
    lane_width_pixels: 280  # Đã ước tính cho độ phân giải 1640x1232 (resize về 640)
    
    # OpenCV settings - TUNED FOR BLACK LINES
    roi_top_ratio: 0.4
    roi_bottom_ratio: 1.0
    
    canny_low: 30
    canny_high: 100
    
    hough_threshold: 15
    min_line_length: 25
    max_line_gap: 15
    
    blur_kernel: 7
    use_clahe: true
    invert_grayscale: true  # Đảo màu để tìm vạch đen
    
    min_slope: 0.4
    smoothing_factor: 0.7
    confidence_threshold: 0.6
    
    lane_lost_threshold: 10
    lane_lost_action: 'stop'
    
    # Adaptive Threshold (Fallback)
    adaptive:
      enabled: true
      block_size: 15
      c_value: 5
      min_contour_area: 100
      use_when_hough_fails: true

# Lane Following Settings (PID-based)
lane_following:
  enabled: true
  
  # PID Controller parameters
  pid:
    kp: 1.0
    ki: 0.02
    kd: 0.4
    max_output: 255
    min_output: -255
    derivative_smoothing: 0.7
    integral_limit: 100
  
  # Speed settings
  base_speed: 130
  max_speed: 200
  min_speed: 80
  
  # Steering settings
  max_steering_angle: 45
  steering_sensitivity: 1.2

# PID Tuning Presets
pid_presets:
  conservative:
    kp: 0.7
    ki: 0.01
    kd: 0.25
  balanced:
    kp: 1.0
    ki: 0.02
    kd: 0.4
  aggressive:
    kp: 1.5
    ki: 0.03
    kd: 0.6
  ultra_safe:
    kp: 0.5
    ki: 0.0
    kd: 0.2

# Logging
logging:
  level: 'DEBUG'
  file: 'data/logs/robot.log'
  max_size: 10485760
  backup_count: 5
  log_lane_details: true
  log_frequency: 10
  save_debug_frames: false

# Visual Odometry Settings
visual_odometry:
  enabled: true
  scale_factor: 0.05
  max_features: 200
  quality_level: 0.01
  min_distance: 10
  window_size: 21
  max_level: 3
  use_ransac: true
  ransac_threshold: 3.0
  min_features: 50
  redetect_interval: 30