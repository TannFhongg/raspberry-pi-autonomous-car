# ============================================================================
# Hardware Configuration - LogisticsBot
# File cấu hình chính cho toàn bộ hệ thống robot
# ============================================================================

# Chế độ điều khiển motor
# - 'arduino': Dùng Arduino Uno điều khiển motor qua UART (khuyến nghị)
# - 'direct': Dùng GPIO Raspberry Pi trực tiếp (cần L298NDriver)
control_mode: 'arduino'

# ============================================================================
# ARDUINO - Cấu hình giao tiếp UART với Arduino Uno
# ============================================================================
arduino:
  port: '/dev/ttyACM0'    # Cổng serial (thường là /dev/ttyACM0 hoặc /dev/ttyUSB0)
  baudrate: 115200        # Tốc độ truyền (phải khớp với firmware Arduino)

# ============================================================================
# SAFETY - Cấu hình an toàn
# ============================================================================
safety:
  timeout: 800.0  # Thời gian (giây) không nhận lệnh thì tự động dừng robot

# ============================================================================
# CAMERA - Cấu hình Picamera2 (Raspberry Pi Camera Module 2)
# OPTIMIZED: Sử dụng ISP để resize, xuất màu ổn định cho nhận diện
# ============================================================================
sensors:
  camera:
    resolution: [960, 720]    # Output xử lý trung gian: rộng hơn 640x480 nhưng nhẹ hơn 1640x1232
                              # ISP resize phần cứng, KHÔNG dùng CPU!
    framerate: 30             # Số frame/giây
    
    picamera2:
      format: 'RGB888'        # RGB888: ổn định màu cho YOLO/follow, tránh sọc YUV420
      buffer_count: 6         # Số buffer (tăng = mượt hơn, tốn RAM hơn)
      sensor_output_size: [1640, 1232]  # Full FOV sensor mode, ISP scale xuống resolution ở trên
      sensor_bit_depth: 10
      
      # Camera controls - Điều chỉnh chất lượng ảnh
      controls:
        FrameRate: 30         # FPS thực tế
        # Auto White Balance (true = tự động cân bằng trắng)

# ============================================================================
# LANE DETECTION - Cấu hình phát hiện vạch kẻ đường
# Tối ưu cho: Vạch ĐEN trên nền TRẮNG
# ============================================================================
ai:
  lane_detection:
    # ROI (Region of Interest) - Vùng quan tâm trong ảnh
    roi_top_ratio: 0.6       # Bắt đầu ROI từ 35% từ trên (0.0 = đỉnh, 1.0 = đáy)
    roi_bottom_ratio: 1     # Kết thúc ROI tại đáy ảnh
    roi_left_ratio: 0.2      # Biên trái ROI (30% từ trái)
    roi_right_ratio: 0.75     # Biên phải ROI (70% từ trái)
    
    # Canny Edge Detection - Phát hiện cạnh
    canny_low: 80             # Ngưỡng thấp (giảm = nhạy hơn, nhiều edge hơn)
    canny_high: 185           # Ngưỡng cao (tăng = ít edge hơn, rõ ràng hơn)
    
    # Hough Transform - Phát hiện đường thẳng
    hough_threshold: 50       # Số vote tối thiểu để coi là đường thẳng (giảm = nhạy hơn)
    min_line_length: 50       # Độ dài tối thiểu của đường thẳng (pixel)
    max_line_gap: 20         # Khoảng cách tối đa giữa 2 đoạn để nối thành 1 đường
    lane_width_pixels: 709    # Độ rộng lane 25cm đã calibrate theo frame camera thực tế
    camera_offset: 18         # Bù sai số khi robot/camera đã căn giữa nhưng error vẫn lệch
    
    # Preprocessing - Tiền xử lý ảnh
    blur_kernel: 9            # Kích thước kernel Gaussian blur (phải là số lẻ: 3, 5, 7)

# ============================================================================
# LANE FOLLOWING - Cấu hình chế độ Auto (theo vạch)
# ============================================================================
lane_following:
  # PID Controller - Điều khiển steering
  pid:
    kp: 1.0               # Proportional: Phản ứng tỷ lệ với error (tăng = nhanh hơn)
    ki: 0.00                # Integral: Sửa lỗi tích lũy (tăng = bù offset tốt hơn)
    kd: 0.05          # Derivative: Giảm dao động (tăng = mượt hơn)
    max_output: 255           # Giới hạn output tối đa
    min_output: -255          # Giới hạn output tối thiểu
    derivative_smoothing: 0.5 # Làm mượt derivative (0-1, cao = mượt hơn)
  
  # Speed settings - Cấu hình tốc độ
  base_speed: 100              # Tốc độ cơ bản khi đi thẳng (0-255)
  max_speed: 255              # Tốc độ tối đa
  min_speed: 80               # Tốc độ tối thiểu khi vào cua
  turn_sign_angle: 72          # Góc rẽ theo biển, giảm để tránh vượt lố
  turn_sign_speed: 170         # Tốc độ rẽ theo biển, giảm để bớt quán tính

# ============================================================================
# FOLLOW MODE - Cấu hình chế độ theo dõi đối tượng
# ============================================================================
follow_mode:
  # Target size control - Điều khiển khoảng cách bằng kích thước object
  target_size: 206            # Kích thước mục tiêu (pixel) - robot giữ khoảng cách này
  size_tolerance: 30          # Dung sai ±30px (trong khoảng này = đứng yên)
  
  # Speed settings - Cấu hình tốc độ
  forward_speed_max: 170      # Tốc độ tiến tối đa (khi object xa)
  forward_speed_min: 130      # Tốc độ tiến tối thiểu
  backward_speed_min: 120     # Tốc độ lùi tối thiểu để motor đủ lực
  backward_speed: 175         # Tốc độ lùi tối đa (khi object quá gần)
  backing_straight_margin: 60 # Quá gần hơn SIZE_MAX + margin thì ưu tiên lùi thẳng
  backing_turn_ratio: 0.4     # Khi chỉ hơi gần, xoay tối đa 40% tốc độ lùi
  turn_speed_max: 165         # Tốc độ xoay tối đa
  turn_speed_min: 70          # Tốc độ xoay tối thiểu khi lệch tâm để motor đủ lực
  horizontal_tolerance: 20    # Sai số tâm ±20px thì không xoay
  
  # PID cho centering (giữ object ở giữa frame)
  pid_horizontal:
    kp: 0.32                  # Proportional
    ki: 0.0                   # Integral (thường = 0)
    kd: 0.08                  # Derivative
  
  # PID cho distance (giữ khoảng cách)
  pid_distance:
    kp: 0.42                  # Proportional
    ki: 0.0                   # Integral
    kd: 0.08                  # Derivative
